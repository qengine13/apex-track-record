# Verify the public hash-chained track record on every push.
#
# The verifier is VENDORED into this repo (./verifier — zero third-party
# deps, ~150 lines, readable end-to-end), so verification needs no
# external checkout and auditors can read the exact code CI runs.
# (Previous design checked out a qengine13/trade repo that is not public
# — first push failed on Not Found; fixed 2026-06-12.)

name: Verify Chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify chain
        run: python -m verifier chain
